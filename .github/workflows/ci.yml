name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  HUSKY: 0

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: amana
          POSTGRES_PASSWORD: amana_dev_only
          POSTGRES_DB: amana_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U amana -d amana_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20.18.0'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec biome check .

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Apply migrations
        env:
          DATABASE_URL: postgres://amana:amana_dev_only@localhost:5432/amana_dev
        run: pnpm --filter @amana/backend db:migrate

      - name: Test (backend, with coverage gate)
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://amana:amana_dev_only@localhost:5432/amana_dev
        run: pnpm --filter @amana/backend test:coverage

      - name: Test (other workspaces)
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://amana:amana_dev_only@localhost:5432/amana_dev
        run: pnpm --filter '!@amana/backend' test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
